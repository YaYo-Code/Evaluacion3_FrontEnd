<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 52" width="48" height="52">
  <!-- Mini dino pixelado, mismo estilo que el del juego. U = 4px -->
  <g fill="#57c97e">
    <rect x="0"  y="24" width="12" height="8"/>   <!-- cola -->
    <rect x="8"  y="20" width="24" height="16"/>  <!-- cuerpo -->
    <rect x="12" y="16" width="16" height="4"/>   <!-- lomo -->
    <rect x="28" y="4"  width="16" height="20"/>  <!-- cabeza -->
    <rect x="24" y="16" width="8"  height="8"/>   <!-- cuello -->
    <rect x="24" y="28" width="4"  height="4"/>   <!-- brazo -->
    <rect x="24" y="36" width="8"  height="12"/>  <!-- pata trasera -->
    <rect x="12" y="36" width="8"  height="12"/>  <!-- pata delantera -->
  </g>
  <rect x="36" y="8" width="4" height="4" fill="#14171c"/> <!-- ojo -->
</svg>
